<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ReplyShastra AI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b2cff">
<link rel="icon" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

body{
background:#050008;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
right:0;
height:65px;
display:flex;
align-items:center;
gap:12px;
padding:0 15px;
background:rgba(0,0,0,.55);
z-index:60;
}

.menuBtn{
font-size:26px;
cursor:pointer;
}

.logo img{
width:34px;
border-radius:10px;
}

.username{
margin-left:auto;
font-size:14px;
opacity:.8;
}

/* SIDE MENU */

.sideMenu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#140021;
padding:90px 25px;
transition:.35s;
z-index:100;
}

.sideMenu a{
display:block;
margin:22px 0;
font-size:18px;
text-decoration:none;
color:white;
}

#menuOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:55;
}

/* CHAT */

.chatbox{
position:fixed;
top:65px;
bottom:78px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
background:url("weapon-bg.png") center/cover no-repeat;
}

.msg{
max-width:78%;
padding:12px 15px;
border-radius:18px;
font-size:15px;
animation:fadeIn .3s ease;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#7b2cff,#b067ff);
}

.bot{
align-self:flex-start;
background:#1b1b24;
border:1px solid rgba(255,255,255,.1);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* INPUT */

.inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:10px;
padding:12px;
background:rgba(0,0,0,.65);
}

input{
flex:1;
padding:14px;
border-radius:14px;
border:none;
background:#0e0e14;
color:white;
}

/* SEND BUTTON */

.sendBtn{
padding:12px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#c0c0c0,#ffffff);
color:black;
font-weight:600;
cursor:pointer;
}

/* TYPING */

.typing{
display:flex;
gap:4px;
padding:10px 14px;
background:#1b1b24;
border-radius:18px;
width:60px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}

</style>

</head>

<body>

<!-- MENU -->

<div id="menu" class="sideMenu">

<a href="#" onclick="installApp()">Download App</a>
<a href="#" onclick="shareApp()">Share App</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
<a href="about.html">About</a>

<hr style="opacity:.2;margin:25px 0;">

<a href="#" onclick="logout()">Logout</a>

</div>

<div id="menuOverlay"></div>

<!-- HEADER -->

<div class="header">

<div class="menuBtn" onclick="toggleMenu()">☰</div>

<div class="logo">
<img src="icon.png">
</div>

<div>ReplyShastra</div>

<div id="username" class="username"></div>

</div>

<!-- CHAT -->

<div id="chat" class="chatbox"></div>

<!-- INPUT -->

<div class="inputArea">

<input id="text" placeholder="Describe your situation...">

<button class="sendBtn" onclick="send()">Send</button>

</div>

<audio id="sendSound" src="send.mp3"></audio>
<audio id="replySound" src="reply.mp3"></audio>
<audio id="typingSound" src="typing.mp3"></audio>

<script>

/* LOGIN CHECK */

const userEmail = localStorage.getItem("rs_user")

if(!userEmail){
window.location="login.html"
}

/* USERNAME SHOW */

if(userEmail){

const name=userEmail.split("@")[0]

document.getElementById("username").innerText=name

}

/* MENU */

let menuOpen=false

function toggleMenu(){

const menu=document.getElementById("menu")
const overlay=document.getElementById("menuOverlay")

menuOpen=!menuOpen

menu.style.left=menuOpen?"0":"-260px"
overlay.style.display=menuOpen?"block":"none"

}

document.getElementById("menuOverlay").onclick=toggleMenu

/* CHAT */

const chat=document.getElementById("chat")
const text=document.getElementById("text")

function addMessage(msg,type){

let div=document.createElement("div")
div.className="msg "+type
div.innerText=msg

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function showTyping(){

let typing=document.createElement("div")

typing.className="typing"
typing.id="typing"

typing.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>"

chat.appendChild(typing)

}

function removeTyping(){

let t=document.getElementById("typing")

if(t)t.remove()

}

async function send(){

let msg=text.value.trim()

if(!msg)return

document.getElementById("sendSound").play()

addMessage(msg,"user")

text.value=""

showTyping()

document.getElementById("typingSound").play()

try{

const res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_OPENAI_KEY"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{role:"system",content:"You generate romantic relationship replies."},
{role:"user",content:msg}
]

})

})

const data=await res.json()

removeTyping()

document.getElementById("replySound").play()

addMessage(data.choices[0].message.content,"bot")

}catch{

removeTyping()

addMessage("AI error. Try again.","bot")

}

}

text.addEventListener("keypress",e=>{
if(e.key==="Enter")send()
})

function logout(){

localStorage.removeItem("rs_user")

window.location="login.html"

}

function shareApp(){

if(navigator.share){

navigator.share({
title:"ReplyShastra AI",
text:"Try ReplyShastra AI - Smart relationship reply generator",
url:"https://replyshastra.web.app"
})

}else{

alert("Share not supported on this device")

}

}
  
</script>

</body>
</html>
