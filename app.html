<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ReplyShastra AI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b2cff">
<link rel="icon" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

body{
background:#050008;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
right:0;
height:65px;
display:flex;
align-items:center;
gap:12px;
padding:0 15px;
background:rgba(0,0,0,.55);
z-index:60;
}

.menuBtn{
font-size:26px;
cursor:pointer;
}

.logo img{
width:34px;
border-radius:10px;
}

.username{
margin-left:auto;
font-size:14px;
opacity:.8;
}

/* SIDE MENU */

.sideMenu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#140021;
padding:90px 25px;
transition:.35s;
z-index:100;
}

.sideMenu a{
display:block;
margin:22px 0;
font-size:18px;
text-decoration:none;
color:white;
}

#menuOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
z-index:55;
}

/* CHAT */

.chatbox{
position:fixed;
top:65px;
bottom:78px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
background:url("weapon-bg.png") center/cover no-repeat;
}

.msg{
max-width:78%;
padding:12px 15px;
border-radius:18px;
font-size:15px;
animation:fadeIn .3s ease;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#7b2cff,#b067ff);
}

.bot{
align-self:flex-start;
background:#1b1b24;
border:1px solid rgba(255,255,255,.1);
}

/* TYPING */

.typing{
display:flex;
gap:4px;
padding:10px 14px;
background:#1b1b24;
border-radius:18px;
width:60px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%,80%,100%{opacity:.2}
40%{opacity:1}
}

/* INPUT */

.inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:10px;
padding:12px;
background:rgba(0,0,0,.65);
}

input{
flex:1;
padding:14px;
border-radius:14px;
border:none;
background:#0e0e14;
color:white;
}

.sendBtn{
padding:12px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#c0c0c0,#ffffff);
color:black;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<div id="menu" class="sideMenu">

<a href="#" onclick="installApp()">Download App</a>
<a href="#" onclick="shareApp()">Share App</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
<a href="about.html">About</a>

<hr style="opacity:.2;margin:25px 0;">

<a href="#" onclick="logout()">Logout</a>

</div>

<div id="menuOverlay"></div>

<div class="header">

<div class="menuBtn" onclick="toggleMenu()">☰</div>

<div class="logo">
<img src="icon.png">
</div>

<div>ReplyShastra</div>

<div id="username" class="username"></div>

</div>

<div id="chat" class="chatbox"></div>

<div class="inputArea">

<input id="text" placeholder="Describe your situation...">
<button class="sendBtn" onclick="send()">Send</button>

</div>

<audio id="sendSound" src="send.mp3"></audio>
<audio id="replySound" src="reply.mp3"></audio>

<script>

const userEmail = localStorage.getItem("rs_user")

if(!userEmail){
window.location="login.html"
}

if(userEmail){
const name=userEmail.split("@")[0]
document.getElementById("username").innerText=name
}

let menuOpen=false

function toggleMenu(){

const menu=document.getElementById("menu")
const overlay=document.getElementById("menuOverlay")

menuOpen=!menuOpen

menu.style.left=menuOpen?"0":"-260px"
overlay.style.display=menuOpen?"block":"none"

}

document.getElementById("menuOverlay").onclick=toggleMenu

const chat=document.getElementById("chat")
const text=document.getElementById("text")

function addMessage(msg,type){

let div=document.createElement("div")
div.className="msg "+type
div.innerText=msg

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* TYPING */

function showTyping(){

let typing=document.createElement("div")

typing.className="typing"
typing.id="typing"

typing.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>"

chat.appendChild(typing)

chat.scrollTop=chat.scrollHeight

}

function removeTyping(){

let t=document.getElementById("typing")

if(t)t.remove()

}

/* SEND */

function send(){

let msg=text.value.trim()

if(!msg)return

try{
document.getElementById("sendSound").play()
}catch{}

addMessage(msg,"user")

text.value=""

showTyping()

setTimeout(()=>{

removeTyping()

let reply =
"Advice:\nBe honest and apologise.\n\n"+
"Reply 1:\nI'm really sorry I forgot your birthday. You mean a lot to me and I want to make it up to you.\n\n"+
"Reply 2:\nI know I messed up forgetting your birthday. I'm truly sorry and I'd love to make it special for you.\n\n"+
"Reply 3:\nI hate that I forgot your birthday. You deserve better and I'm really sorry.";

addMessage(reply,"bot")

try{
document.getElementById("replySound").play()
}catch{}

},1200)

}

text.addEventListener("keypress",e=>{
if(e.key==="Enter")send()
})

function logout(){

localStorage.removeItem("rs_user")
window.location="login.html"

}

function shareApp(){

if(navigator.share){

navigator.share({
title:"ReplyShastra AI",
text:"Try ReplyShastra AI",
url:"https://replyshastra.web.app"
})

}else{

alert("Share not supported on this device")

}

}

</script>

</body>
</html>
