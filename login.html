<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReplyShastra Login</title><link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet"><style>

body{
background:#0a0015;
font-family:Quicksand;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
margin:0;
}

.card{
background:#140021;
padding:40px;
border-radius:18px;
width:300px;
text-align:center;
box-shadow:0 0 25px #7b2cff55;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:10px;
border:none;
background:#0d0d14;
color:white;
}

button{
margin-top:18px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#7b2cff,#b067ff);
color:white;
font-weight:600;
}

.small{
margin-top:10px;
font-size:13px;
cursor:pointer;
opacity:.8;
}

</style></head><body><div class="card"><h2>ReplyShastra</h2>
<p>AI Relationship Reply Generator</p><input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyABvBLrB9KBCJV1YS-8t3SJrqHUfPqB-7LMo",
authDomain:"replyshastra.firebaseapp.com",
projectId:"replyshastra",
storageBucket:"replyshastra.appspot.com",
messagingSenderId:"346754998835",
appId:"1:346754998835:web:ecca09c1bb98a5f9a7f946"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

window.login=function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{
window.location="intro.html";
})
.catch(e=>{
alert(e.message);
});

}

window.signup=function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)
.then(()=>{
alert("Account Created");
window.location="intro.html";
})
.catch(e=>{
alert(e.message);
});

}

</script></body>
</html>
