<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyShastra Login</title>
</head>
<body style="background:#140021;color:white;text-align:center;margin-top:100px;">

<h2>ReplyShastra</h2>
<button id="loginBtn" style="padding:12px 20px;">Login with Google</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "replyshastra.firebaseapp.com",
  projectId: "replyshastra",
  storageBucket: "replyshastra.appspot.com",
  messagingSenderId: "346754998835",
  appId: "1:346754998835:web:ecca09c1bb98a5f9a7f946"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = () => {
  signInWithRedirect(auth, provider);
};

getRedirectResult(auth).then(result => {
  if (result?.user) {
    window.location.href = "app.html";
  }
});

onAuthStateChanged(auth, user => {
  if (user) {
    window.location.href = "app.html";
  }
});
</script>

</body>
</html>
